spring.application.name=library-management
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 1. Database එක තියෙන තැන (URL)
spring.datasource.url=jdbc:mysql://localhost:3306/library_db

# 2. Database එකේ User name එක (සාමාන්‍යයෙන් root)
spring.datasource.username=root

# 3. ඔයා MySQL install කරද්දී දාපු Password එක
spring.datasource.password=chanaka123

# 4. Hibernate මගින් ඉබේම Tables හැදීමට (DDL Auto)
spring.jpa.hibernate.ddl-auto=update

# 5. Backend එකෙන් රන් වන SQL කෝඩ් ටර්මිනල් එකේ පෙන්වීමට (පහසුව සඳහා)
spring.jpa.show-sql=true